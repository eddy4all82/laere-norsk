<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testers Dashboard - Lære Norsk</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f1729;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .top-bar {
            background: #1a237e;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .top-bar .brand {
            display: flex; align-items: center; gap: 12px;
        }

        .top-bar .logo {
            width: 36px; height: 36px;
            background: #ffab00;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 14px; color: #1a237e;
        }

        .top-bar h1 {
            font-size: 18px; font-weight: 700;
        }

        .top-bar .refresh-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .top-bar .refresh-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Stats cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
        }

        .stat-card .label {
            font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 36px; font-weight: 800;
        }

        .stat-card .value.gold { color: #ffab00; }
        .stat-card .value.green { color: #4caf50; }
        .stat-card .value.blue { color: #42a5f5; }
        .stat-card .value.red { color: #ef5350; }

        .stat-card .sub {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        /* Country breakdown */
        .section-title {
            font-size: 18px; font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
        }

        .country-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .country-row:last-child { border-bottom: none; }

        .country-row .name { font-size: 14px; }
        .country-row .count {
            font-size: 14px; font-weight: 700; color: #ffab00;
        }

        .bar-container {
            flex: 1;
            margin: 0 12px;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #ffab00, #ff8f00);
            transition: width 0.5s ease;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            font-size: 12px; font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            user-select: none;
        }

        thead th:hover {
            color: rgba(255,255,255,0.7);
        }

        thead th.sorted {
            color: #ffab00;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        tbody td {
            padding: 14px 16px;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }

        .status-badge.active {
            background: rgba(76,175,80,0.15);
            color: #66bb6a;
        }

        .status-badge.completed {
            background: rgba(33,150,243,0.15);
            color: #42a5f5;
        }

        .status-badge.inactive {
            background: rgba(239,83,80,0.15);
            color: #ef5350;
        }

        .days-left {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .days-left.urgent { color: #ef5350; font-weight: 600; }
        .days-left.ok { color: #66bb6a; }

        /* Export button */
        .actions {
            display: flex; gap: 10px;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .action-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .action-btn.primary {
            background: #ffab00;
            color: #1a237e;
            border-color: #ffab00;
        }

        /* Loading state */
        .loading-state {
            text-align: center;
            padding: 60px 0;
            color: rgba(255,255,255,0.4);
        }

        .loading-state .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,171,0,0.2);
            border-top-color: #ffab00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: rgba(255,255,255,0.4);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Search */
        .search-bar {
            display: flex; gap: 12px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .search-bar input:focus {
            outline: none;
            border-color: #ffab00;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="brand">
            <div class="logo">MN</div>
            <h1>Testers Dashboard</h1>
        </div>
        <button class="refresh-btn" onclick="loadTesters()">Refresh</button>
    </div>

    <div class="container">
        <!-- Loading -->
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>Loading testers...</p>
        </div>

        <!-- Main content (hidden until loaded) -->
        <div id="mainContent" style="display:none;">
            <!-- Stats -->
            <div class="stats" id="statsGrid"></div>

            <!-- Country breakdown + recent registrations -->
            <div class="two-col">
                <div class="panel">
                    <div class="section-title">Testers by Country</div>
                    <div id="countryBreakdown"></div>
                </div>
                <div class="panel">
                    <div class="section-title">Recent Registrations</div>
                    <div id="recentList"></div>
                </div>
            </div>

            <!-- Full table -->
            <div class="panel" style="padding:0;">
                <div style="padding:20px 20px 0;">
                    <div class="section-title" style="margin-bottom:12px;">All Testers</div>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search by name, email, or country..." oninput="filterTable()">
                    </div>
                    <div class="actions">
                        <button class="action-btn" onclick="exportCSV()">Export CSV</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th onclick="sortBy('name')">#</th>
                                <th onclick="sortBy('name')">Name</th>
                                <th onclick="sortBy('email')">Email</th>
                                <th onclick="sortBy('country')">Country</th>
                                <th onclick="sortBy('registered_at')">Registered</th>
                                <th onclick="sortBy('status')">Status</th>
                                <th>Test Period</th>
                            </tr>
                        </thead>
                        <tbody id="testersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ykdgdjcyzrxvhiodkkmy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrZGdkamN5enJ4dmhpb2Rra215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODU5MTksImV4cCI6MjA5NTY2MTkxOX0.AWPtFVSwMuqhplis2X9G7Q7kjU6zS7LvX3XJtSO_1Os';

        let allTesters = [];
        let sortField = 'registered_at';
        let sortDir = 'desc';

        async function loadTesters() {
            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/testers?select=*&order=registered_at.desc`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (!res.ok) throw new Error('Failed to load');

                allTesters = await res.json();
                renderAll();

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch (err) {
                console.error(err);
                document.getElementById('loadingState').innerHTML =
                    '<p style="color:#ef5350;">Error loading data. Make sure the testers table exists in Supabase.</p>';
            }
        }

        function renderAll() {
            renderStats();
            renderCountries();
            renderRecent();
            renderTable();
        }

        function renderStats() {
            const total = allTesters.length;
            const active = allTesters.filter(t => t.status === 'active').length;
            const completed = allTesters.filter(t => t.status === 'completed').length;

            // Testers this week
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const thisWeek = allTesters.filter(t => new Date(t.registered_at) >= weekAgo).length;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="label">Total Testers</div>
                    <div class="value gold">${total}</div>
                    <div class="sub">All time registrations</div>
                </div>
                <div class="stat-card">
                    <div class="label">Active Testers</div>
                    <div class="value green">${active}</div>
                    <div class="sub">Currently testing</div>
                </div>
                <div class="stat-card">
                    <div class="label">This Week</div>
                    <div class="value blue">${thisWeek}</div>
                    <div class="sub">New registrations</div>
                </div>
                <div class="stat-card">
                    <div class="label">Completed</div>
                    <div class="value" style="color:#ab47bc;">${completed}</div>
                    <div class="sub">Finished test period</div>
                </div>
            `;
        }

        function renderCountries() {
            const countries = {};
            allTesters.forEach(t => {
                countries[t.country] = (countries[t.country] || 0) + 1;
            });

            const sorted = Object.entries(countries).sort((a, b) => b[1] - a[1]);
            const max = sorted.length > 0 ? sorted[0][1] : 1;

            document.getElementById('countryBreakdown').innerHTML = sorted.length === 0
                ? '<p style="color:rgba(255,255,255,0.3); text-align:center; padding:20px;">No data yet</p>'
                : sorted.map(([country, count]) => `
                    <div class="country-row">
                        <span class="name">${country}</span>
                        <div class="bar-container">
                            <div class="bar-fill" style="width:${(count/max)*100}%"></div>
                        </div>
                        <span class="count">${count}</span>
                    </div>
                `).join('');
        }

        function renderRecent() {
            const recent = allTesters.slice(0, 5);
            document.getElementById('recentList').innerHTML = recent.length === 0
                ? '<p style="color:rgba(255,255,255,0.3); text-align:center; padding:20px;">No registrations yet</p>'
                : recent.map(t => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04);">
                        <div>
                            <div style="font-weight:600; font-size:14px;">${t.name}</div>
                            <div style="font-size:12px; color:rgba(255,255,255,0.4);">${t.email}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:12px; color:#ffab00;">${t.country}</div>
                            <div style="font-size:11px; color:rgba(255,255,255,0.3);">${timeAgo(t.registered_at)}</div>
                        </div>
                    </div>
                `).join('');
        }

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allTesters;

            if (search) {
                filtered = allTesters.filter(t =>
                    t.name.toLowerCase().includes(search) ||
                    t.email.toLowerCase().includes(search) ||
                    t.country.toLowerCase().includes(search)
                );
            }

            // Sort
            filtered.sort((a, b) => {
                let va = a[sortField] || '';
                let vb = b[sortField] || '';
                if (sortField === 'registered_at') {
                    va = new Date(va); vb = new Date(vb);
                }
                if (va < vb) return sortDir === 'asc' ? -1 : 1;
                if (va > vb) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });

            document.getElementById('testersTable').innerHTML = filtered.length === 0
                ? '<tr><td colspan="7" style="text-align:center; padding:40px; color:rgba(255,255,255,0.3);">No testers found</td></tr>'
                : filtered.map((t, i) => {
                    const daysLeft = Math.ceil((new Date(t.test_end_date) - new Date()) / (1000*60*60*24));
                    const daysClass = daysLeft <= 3 ? 'urgent' : daysLeft <= 7 ? '' : 'ok';
                    const daysText = daysLeft > 0 ? `${daysLeft} days left` : 'Ended';

                    return `<tr>
                        <td style="color:rgba(255,255,255,0.3);">${i+1}</td>
                        <td style="font-weight:600;">${t.name}</td>
                        <td style="color:rgba(255,255,255,0.6);">${t.email}</td>
                        <td>${t.country}</td>
                        <td style="font-size:13px; color:rgba(255,255,255,0.5);">${formatDate(t.registered_at)}</td>
                        <td><span class="status-badge ${t.status}">${t.status}</span></td>
                        <td><span class="days-left ${daysClass}">${daysText}</span></td>
                    </tr>`;
                }).join('');
        }

        function sortBy(field) {
            if (sortField === field) {
                sortDir = sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                sortField = field;
                sortDir = 'asc';
            }
            renderTable();
        }

        function filterTable() {
            renderTable();
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function timeAgo(iso) {
            const diff = Date.now() - new Date(iso).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            const days = Math.floor(hrs / 24);
            return `${days}d ago`;
        }

        function exportCSV() {
            if (allTesters.length === 0) return;

            const headers = ['Name', 'Email', 'Country', 'Registered', 'Status'];
            const rows = allTesters.map(t => [
                t.name, t.email, t.country,
                formatDate(t.registered_at), t.status
            ]);

            let csv = headers.join(',') + '\n';
            rows.forEach(r => {
                csv += r.map(v => `"${v}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `testers_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Load on page open
        loadTesters();

        // Auto-refresh every 60 seconds
        setInterval(loadTesters, 60000);
    </script>
</body>
</html>
